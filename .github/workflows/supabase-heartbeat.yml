name: Supabase Heartbeat

on:
  schedule:
    # Mondays and Thursdays at 09:00 UTC (06:00 São Paulo)
    - cron: "0 9 * * 1,4"
  workflow_dispatch:  # allows manual trigger from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase Edge Function
        run: |
          response=$(curl -s -o /tmp/body -w "%{http_code}" \
            "${{ secrets.SUPABASE_HEARTBEAT_URL }}")
          echo "HTTP status: $response"
          echo "Body: $(cat /tmp/body)"
          if [ "$response" -ne 200 ]; then
            echo "::error::Heartbeat failed with status $response"
            exit 1
          fi
